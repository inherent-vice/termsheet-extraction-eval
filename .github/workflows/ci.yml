name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          pip install -e .[dev]
      - name: Lint
        run: |
          ruff check src/ tests/
      - name: Test
        run: |
          pytest tests/ -v
      - name: Benchmark (ablation gate)
        run: |
          python -m termsheet_eval.cli benchmark --version all --write
          python -c "
          import json, pathlib
          results = {v: json.loads(pathlib.Path(f'benchmarks/results/{v}.json').read_text())
                     for v in ['v1', 'v2', 'v3']}
          v1 = results['v1']['metrics']['match_rate']
          v3 = results['v3']['metrics']['match_rate']
          assert v3 > v1, f'Ablation regression: v3 ({v3:.3f}) should beat v1 ({v1:.3f})'
          assert v3 >= 0.99, f'v3 match rate regressed below 0.99: {v3:.3f}'
          print(f'Ablation gate passed: v1={v1:.3f} → v3={v3:.3f}')
          "
